<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قهوة 506</title>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
header{background:#111;color:white;text-align:center;padding:15px}
.container{padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px}
.product{background:white;padding:15px;border-radius:10px;text-align:center}
button{background:#111;color:white;border:none;padding:10px;border-radius:6px;width:100%}
.cart, .checkout{background:white;padding:15px;margin-top:20px;border-radius:10px}
input{width:100%;padding:10px;margin-top:10px;border-radius:6px;border:1px solid #ccc}
</style>

</head>
<body>

<header>
<h2>☕ قهوة 506</h2>
</header>

<div class="container">

<h3>المنيو</h3>

<div class="products">

<div class="product">
<p>V60 ice</p>
<p>13 ريال</p>
<button onclick="add('V60 ice',13)">إضافة</button>
</div>

<div class="product">
<p>V60 hot</p>
<p>14 ريال</p>
<button onclick="add('V60 hot',14)">إضافة</button>
</div>

<div class="product">
<p>سبنش لاتيه ايس</p>
<p>13 ريال</p>
<button onclick="add('سبنش لاتيه',13)">إضافة</button>
</div>

</div>

<!-- 🛒 السلة -->
<div class="cart">
<h3>🛒 السلة</h3>
<ul id="list"></ul>
<p id="total">المجموع: 0 ريال</p>
</div>

<!-- 📦 التوصيل -->
<div class="checkout">
<h3>📦 بيانات التوصيل</h3>
<input placeholder="الاسم" id="name">
<input placeholder="العنوان" id="address">
<input placeholder="رقم الجوال" id="phone">

<button onclick="pay()">💳 ادفع الآن</button>
</div>

</div>

<script>
let total = 0;

function add(name, price){
  let li = document.createElement("li");
  li.textContent = name + " - " + price + " ريال";
  document.getElementById("list").appendChild(li);

  total += price;
  document.getElementById("total").textContent = "المجموع: " + total + " ريال";
}

function pay(){
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;

  if(!name || !address || !phone){
    alert("❌ عبي كل البيانات");
    return;
  }

  if(total === 0){
    alert("❌ السلة فاضية");
    return;
  }

  alert("✅ تم الطلب بنجاح!\n📦 سيتم التوصيل إلى: " + address + "\n💰 المبلغ: " + total + " ريال");
}
</script>

</body>
</html>
